name: release-gate

on:
  pull_request:
    paths:
      - 'packages/core/**'
      - 'packages/react/**'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*'

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify core package
        run: npm run verify:package -w @passiveintent/core

      - name: React pack dry-run
        run: npm pack --dry-run -w @passiveintent/react
