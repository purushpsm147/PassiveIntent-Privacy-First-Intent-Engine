name: ci / root

# Repo-wide checks that apply regardless of which package changed.
# Package-specific CI lives in ci.<package>.yml.

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format:check
